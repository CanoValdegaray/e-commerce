<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="https://i.postimg.cc/W1c6yQSg/HubTech.png" type="image/x-icon">
    <title>Tienda en Línea</title>
    <link rel="stylesheet" href="/Css/Formularios.css">
    <link rel="stylesheet" href="/Css/Generales.css">
    <link rel="stylesheet" href="/Css/Menu.css">
</head>
<body>
    <header>
        <div class="logo">
            <img src="https://i.postimg.cc/W1c6yQSg/HubTech.png" alt="Logo de la Tienda" />
        </div>
        <nav>
            <ul id="nav-list">
                <li><a href="/index.html">Inicio</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="Login">
        <h2>Login</h2>
        <form>
            <h2>Iniciar Sesión</h2>
            <label for="email">Correo Electrónico</label>
            <input type="email" id="email" required>
            
            <label for="password">Contraseña</label>
            <input type="password" id="password" required>
            
            <div class="button-container">
                <button type="submit">Iniciar Sesión</button>
                <button type="button" id="register-button">Registrarte</button>
            </div>
        </form>
        
        <script>
            document.getElementById("register-button").addEventListener("click", function() {
                window.location.href = "/Page/Registrarse.html"; // Cambia la ruta por la URL de tu página de registro
            });
        </script>
        
 
        <a href="https://wa.me/1234567890" target="_blank" id="whatsapp" title="Contáctanos en WhatsApp">
            <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WhatsApp" />
        </a>
    </main>
</section>

    <footer>
        <p>&copy; 2024 Tienda en Línea. Todos los derechos reservados.</p>
    </footer> 

    <script src="/Js/Action.js"></script>
</body>
</html>
